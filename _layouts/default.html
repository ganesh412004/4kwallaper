<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js" defer></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo-link" href="{{ '/' | relative_url }}" aria-label="4kWallpaper Home">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="4kWallpaper logo" class="logo" />
        </a>
        <nav class="site-nav" aria-label="Main navigation">
          <a href="{{ '/' | relative_url }}" class="nav-link">Home</a>
          <a href="{{ '/about/' | relative_url }}" class="nav-link">About</a>
        </nav>

        <div class="header-controls">
          <form id="search-form" class="search-form" onsubmit="return doSearch(event)" role="search">
            <label for="search-input" class="sr-only">Search posts</label>
            <input id="search-input" class="search-input" type="search" placeholder="Search posts..." aria-label="Search posts">
            <button class="search-btn" type="submit" aria-label="Search">🔍</button>
          </form>
          <button id="menu-toggle" class="menu-toggle" aria-expanded="false" aria-controls="site-mobile-nav">☰</button>
        </div>
      </div>

      <div id="site-mobile-nav" class="mobile-nav" hidden>
        <a href="{{ '/' | relative_url }}">Home</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer container">
      <small>© {{ site.time | date: '%Y' }} 4kWallpaper</small>
    </footer>

    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
    <script>
      // Mobile menu toggle
      document.addEventListener('DOMContentLoaded', function(){
        var btn = document.getElementById('menu-toggle');
        var nav = document.getElementById('site-mobile-nav');
        if(!btn || !nav) return;
        btn.addEventListener('click', function(){
          var expanded = btn.getAttribute('aria-expanded') === 'true';
          btn.setAttribute('aria-expanded', String(!expanded));
          if(nav.hidden){ nav.hidden = false; } else { nav.hidden = true; }
        });
      });
    </script>
  </body>
</html>
