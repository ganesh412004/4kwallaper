<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2/dist/fuse.min.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="logo-link" href="{{ '/' | relative_url }}">
          <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="4kWallpaper logo" class="logo" />
        </a>
        <form id="search-form" class="search-form" onsubmit="return doSearch(event)">
          <input id="search-input" type="search" placeholder="Search posts...">
          <button type="submit">Search</button>
        </form>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer container">
      <small>© {{ site.time | date: '%Y' }} 4kWallpaper</small>
    </footer>

    <script src="{{ '/assets/js/search.js' | relative_url }}"></script>
  </body>
</html>
